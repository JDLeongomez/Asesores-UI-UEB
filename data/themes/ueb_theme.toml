# Theme metadata
name = "ueb_theme"

# Is theme light or dark?
light = true

# Primary
# Institutional orange (Unidad de Investigaciones), used as-is.
# Note: ~3:1 contrast on white for small text, below WCAG AA's 4.5:1 —
# a deliberate brand-consistency choice.
primary = "#e27a16"

# Menu
menu_primary = "#2b2b2b"
menu_text = "#e27a16"
menu_text_active = "#e27a16"
menu_title = "#e27a16"

# Home sections
home_section_odd = "rgb(255, 255, 255)"
home_section_even = "rgb(247, 247, 247)"

[dark]
  link = "#e27a16"
  link_hover = "#e27a16"
